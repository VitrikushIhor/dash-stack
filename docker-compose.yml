services:
  # ============================================
  # DATABASE
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: dash-stack-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prisma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-topsecret}
      POSTGRES_DB: ${POSTGRES_DB:-blog}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-prisma} -d ${POSTGRES_DB:-blog}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # BACKEND (NestJS)
  # ============================================
  backend:
    container_name: dash-stack-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${BACKEND_PORT:-8000}:8000'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-prisma}:${POSTGRES_PASSWORD:-topsecret}@postgres:5432/${POSTGRES_DB:-blog}?schema=${DB_SCHEMA:-blog}&sslmode=disable
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-nestjsPrismaAccessSecret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-nestjsPrismaRefreshSecret}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-2m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ENABLE_LOGS: ${ENABLE_LOGS:-false}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # FRONTEND (Vite + Nginx)
  # ============================================
  frontend:
    container_name: dash-stack-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-80}:80'
    depends_on:
      - backend

volumes:
  postgres_data:
    name: dash-stack-db-data
